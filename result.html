<!DOCTYPE html>
<html>
<head>
    <title>Submission Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Submission Successful 🎉</h1>
    <div id="resultContent"><p>Loading...</p></div>
    <br>
    <a href="index.html">Go Back</a>
</div>

<script>
var regno = sessionStorage.getItem("currentStudentRegno");
var submissions = JSON.parse(localStorage.getItem("submissions")) || [];

var mySubmission = null;
for (var i = submissions.length - 1; i >= 0; i--) {
    if (submissions[i].regno === regno) {
        mySubmission = submissions[i];
        break;
    }
}

var content = document.getElementById("resultContent");

if (!mySubmission) {
    content.innerHTML = "<p style='color:red;'>No submission found. Please go back and submit again.</p>";
} else {
    content.innerHTML = `
        <p><strong>Student Name:</strong> ${mySubmission.name}</p>
        <p><strong>Register No:</strong> ${mySubmission.regno}</p>
        <p><strong>Class:</strong> ${mySubmission.class}</p>
        <p><strong>Department:</strong> ${mySubmission.dept}</p>
        <p><strong>Faculty:</strong> ${mySubmission.faculty}</p>
        <p><strong>Project Title:</strong> ${mySubmission.title}</p>
        ${mySubmission.isGroup ? `<p><strong>Group Members:</strong> ${mySubmission.groupMembers}</p>` : ""}
        <hr>
        <p><strong>📎 Your Submitted File:</strong></p>
        ${
            mySubmission.fileData.startsWith("data:image/")
            ? `<img src="${mySubmission.fileData}" style="max-width:100%; border-radius:10px; border:2px solid #ff914d;">`
            : `<iframe src="${mySubmission.fileData}" style="width:100%; height:300px; border-radius:10px; border:2px solid #ff914d;" frameborder="0"></iframe>`
        }
        <br><br>
        <a href="${mySubmission.fileData}" download="${mySubmission.fileName}"
            style="background:#ff6f61; color:white; padding:10px 20px; border-radius:15px; text-decoration:none; font-weight:bold;">
            ⬇️ Download My File
        </a>
    `;
}
</script>
</body>
</html>
